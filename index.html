<!DOCTYPE html>
<html>
<head>
  <title>Responsive Footer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
body{
    background-color: #444;
}

footer {
  background: #090250;
  color: #fff;
  padding: 30px 20px;
 position: fixed;
  bottom: 0;
  width:100%;
}

.footer-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  max-width: 1000px;
  margin: auto;
}

.footer-box {
  flex: 1 1 250px;
  margin: 10px;
}

.footer-box h3 {
  margin-bottom: 10px;
}

.footer-box a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin: 5px 0;
}

.footer-box a:hover {
  color: #fff;
}

.copyright {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  border-top: 1px solid #444;
  padding-top: 15px;
}
  </style>
</head>
<body>

  <!-- Your page content here -->

  <footer>
    <div class="footer-container">
      <div class="footer-box">
        <h3>MyWebsite</h3>
        <p>Simple responsive footer design using HTML and CSS.</p>
      </div>

      <div class="footer-box">
        <h3>Quick Links</h3>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </div>

      <div class="footer-box">
        <h3>Follow Us</h3>
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
      </div>
    </div>

    <p class="copyright">© 2026 MyWebsite | All Rights Reserved</p>
  </footer>

</body>
</html>
